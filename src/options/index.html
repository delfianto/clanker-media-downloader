<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Clanker Media Downloader — Settings</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <img src="/icons/icon-48.png" alt="" class="logo" />
      <div class="title-block">
        <h1>Clanker Media Downloader</h1>
        <span class="version" id="version"></span>
      </div>
      <label class="master-toggle" title="Enable / disable the whole extension">
        <span>Extension Enabled</span>
        <span class="switch">
          <input type="checkbox" id="master-enabled" />
          <span class="slider"></span>
        </span>
      </label>
    </header>

    <div class="tab-bar" role="tablist">
      <button class="tab-btn active" id="tab-downloads" role="tab" aria-selected="true">
        Downloads
      </button>
      <button class="tab-btn" id="tab-hosters" role="tab" aria-selected="false">Hosters</button>
    </div>

    <div id="view-downloads">
      <div class="layout">
        <nav class="sidebar">
          <h2>Downloads</h2>
          <ul id="dl-nav">
            <li class="hoster-item active" id="stab-settings">
              <span class="name">Settings</span>
            </li>
            <li class="hoster-item" id="stab-history">
              <span class="name">History</span>
            </li>
            <li class="hoster-item" id="stab-logs">
              <span class="name">Logs</span>
            </li>
          </ul>
        </nav>
        <main class="panel" id="dl-panel">
          <div id="dl-view-settings">
            <div id="dl-settings"></div>
          </div>
          <div id="dl-view-history" hidden>
            <div class="logs-toolbar">
              <span id="history-count" class="log-count"></span>
              <div class="logs-actions">
                <button id="btn-stop-all" class="reset-btn">Stop All</button>
                <button id="btn-resume-all" class="reset-btn">Resume All</button>
                <button id="btn-clear-history" class="reset-btn">Clear</button>
              </div>
            </div>
            <div id="dl-jobs"></div>
            <div
              id="history-pagination"
              class="pagination-controls"
              style="margin-top: 20px; display: flex; justify-content: center; gap: 10px"
            ></div>
          </div>
          <div id="dl-view-logs" hidden>
            <div class="logs-toolbar">
              <span id="log-count" class="log-count"></span>
              <div class="logs-actions">
                <button id="btn-copy-logs" class="reset-btn">Copy</button>
                <button id="btn-clear-logs" class="reset-btn">Clear</button>
              </div>
            </div>
            <div id="dl-logs" class="log-list"></div>
          </div>
        </main>
      </div>
    </div>

    <div id="view-hosters" hidden>
      <div class="layout">
        <nav class="sidebar">
          <h2>Hosters</h2>
          <ul id="hoster-list"></ul>
        </nav>
        <main class="panel" id="panel"></main>
      </div>
    </div>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>

    <script type="module" src="./index.ts"></script>
  </body>
</html>
